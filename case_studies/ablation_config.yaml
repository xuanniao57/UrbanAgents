# UrbanAgent Ablation Configuration
# Design: 7 configs per case × 2 cases = 14 runs
# Each config maps directly to the 3 gaps in Section 2.4

cases:
  case1:
    id: case1_heritage_x_indicators
    title: "Heritage District Built-Environment X-Indicator Construction"
    input_file: "case_studies/case1_heritage/task_input.json"
    prompt_file: "case_studies/case1_heritage/prompts/case1_task_inputA_open.md"
    runs_dir: "case_studies/case1_heritage/runs"
    repeat: 3

  case2:
    id: case2_walkability
    title: "Urban Walkability Assessment"
    input_file: "case_studies/case2_walkability/task_input.json"
    runs_dir: "case_studies/case2_walkability/runs"
    repeat: 1

# Ablation configurations
# Flags match MultiAgentOrchestrator.__init__ parameters
configurations:
  c0_full:
    label: "FULL"
    description: "All components enabled — baseline"
    flags:
      enable_planning: true
      enable_review: true
      enable_quality_control: true
      enable_dual_space: true
      enable_memory: true

  c1_wo_planning:
    label: "w/o Planning"
    description: "Remove PlannerAgent → task passed directly to Manager without decomposition or capability selection"
    targets_gap: "Gap 1 (input adequacy)"
    hypothesis: "Indicators will be generic; no data-method alignment check; evidence manifest may be empty"
    flags:
      enable_planning: false
      enable_review: true
      enable_quality_control: true
      enable_dual_space: true
      enable_memory: true

  c2_wo_review:
    label: "w/o Review"
    description: "Remove Review Hub → no spatial/temporal/population/governance policy checks"
    targets_gap: "Gap 2 (reasoning inspectability)"
    hypothesis: "No urban_validity_score; hard failures undetected; spatial misclassifications pass silently"
    flags:
      enable_planning: true
      enable_review: false
      enable_quality_control: true
      enable_dual_space: true
      enable_memory: true

  c3_wo_qc:
    label: "w/o Quality Control"
    description: "Remove QualityController → no configurator/recommender checks on plan or outputs"
    targets_gap: "Gap 2 (reasoning inspectability)"
    hypothesis: "Plans with missing required fields may pass; execution confidence unscored"
    flags:
      enable_planning: true
      enable_review: true
      enable_quality_control: false
      enable_dual_space: true
      enable_memory: true

  c4_wo_dualspace:
    label: "w/o DualSpace"
    description: "Remove dual-space cognition → no topology construction or spatial relation checking"
    targets_gap: "Gap 2 (spatial-structure reasoning)"
    hypothesis: "Connectivity/barrier/containment relations not computed; spatial diagnostics missing"
    flags:
      enable_planning: true
      enable_review: true
      enable_quality_control: true
      enable_dual_space: false
      enable_memory: true

  c5_wo_memory:
    label: "w/o Memory"
    description: "Remove FeedbackMemory + MemoryModule → no lesson retrieval before planning, no persistence after run"
    targets_gap: "Gap 3 (feedback reuse)"
    hypothesis: "Prior corrections not injected into planner context; no persistent place-based memory"
    flags:
      enable_planning: true
      enable_review: true
      enable_quality_control: true
      enable_dual_space: true
      enable_memory: false

  c6_vanilla:
    label: "VANILLA"
    description: "All agent scaffolding disabled — bare LLM call, no capability execution"
    targets_gap: "all three gaps"
    hypothesis: "Output is a free-text LLM response with no evidence manifest, no review, no memory, no GIS artifacts"
    flags:
      enable_planning: false
      enable_review: false
      enable_quality_control: false
      enable_dual_space: false
      enable_memory: false
      disable_capabilities: true

# Evaluation signals to extract per run
evaluation_signals:
  gap1_input:
    - evidence_manifest_present: "summary.json → results → evidence_manifest exists"
    - spatial_block_complete: "bbox, crs, admin_level all present"
    - temporal_block_complete: "time_window, granularity, freshness present"
    - selected_capabilities_count: "number of capabilities Planner selected"
    - data_method_fit_manual: "manual review: do selected methods match data?"

  gap2_reasoning:
    - urban_validity_score: "summary.json → review → urban_validity_score"
    - policy_scores: "spatial_structural_review, temporal_consistency_review, population_and_stakeholder_review, evidence_and_governance_review"
    - hard_failures_count: "summary.json → review → hard_failures length"
    - qc_passed: "summary.json → qc → plan_pass and exec_pass"
    - artifact_count: "number of structured artifacts (GeoJSON, CSV, report)"

  gap3_feedback:
    - feedback_lessons_injected: "manifest.json → planner → selected_feedback_lessons count"
    - checkpoint_count: "summary.json → runtime → checkpoints count"
    - todo_completion_ratio: "summary.json → runtime → todos completed/total"
    - persistent_memory_stored: "whether memory_module.store() was called"
