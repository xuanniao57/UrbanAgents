<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Dual-space cognition representation</title>
  <desc id="desc">Diagram showing how UrbanAgent aligns vector geometry and topological graph representations for urban reasoning.</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .text { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #374151; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
  </style>
  <rect x="0" y="0" width="1000" height="620" fill="#fffdf8"/>
  <text x="36" y="40" class="title">Dual-space cognition in UrbanAgent</text>
  <text x="36" y="66" class="subtitle">The framework maintains a metric vector view and a relational topological view, then aligns them through shared anchors and spatial relations.</text>

  <rect x="36" y="96" width="290" height="370" class="box"/>
  <text x="56" y="126" class="label">Vector space</text>
  <text x="56" y="146" class="small">Geometry, coordinates, distances, areas</text>
  <rect x="62" y="178" width="238" height="220" fill="#eef6ff" stroke="#93c5fd" stroke-width="1.2" rx="10"/>
  <path d="M82 212 L280 212" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M112 198 L112 370" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
  <path d="M160 198 L160 370" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M218 198 L218 370" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <path d="M252 198 L252 370" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <rect x="88" y="226" width="32" height="44" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="126" y="236" width="24" height="34" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="168" y="228" width="40" height="50" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="224" y="236" width="22" height="32" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="92" y="302" width="44" height="28" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="150" y="310" width="34" height="40" fill="#d6d3d1" stroke="#78716c"/>
  <rect x="206" y="304" width="48" height="34" fill="#d6d3d1" stroke="#78716c"/>
  <circle cx="112" cy="212" r="8" fill="#ef4444"/>
  <circle cx="160" cy="212" r="8" fill="#10b981"/>
  <circle cx="218" cy="212" r="8" fill="#3b82f6"/>
  <circle cx="252" cy="212" r="8" fill="#f59e0b"/>
  <text x="70" y="425" class="text">• road geometry and building footprints</text>
  <text x="70" y="447" class="text">• anchor coordinates for nodes and landmarks</text>

  <rect x="360" y="96" width="280" height="370" class="box"/>
  <text x="380" y="126" class="label">Alignment layer</text>
  <text x="380" y="146" class="small">Shared anchors map graph entities to geometry</text>
  <rect x="386" y="182" width="228" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2" rx="10"/>
  <text x="404" y="208" class="text">Node anchors</text>
  <text x="404" y="232" class="small">junction_01 → (121.468, 31.205)</text>
  <text x="404" y="252" class="small">plaza_02 → polygon centroid</text>
  <rect x="386" y="286" width="228" height="86" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2" rx="10"/>
  <text x="404" y="312" class="text">Relation grounding</text>
  <text x="404" y="336" class="small">connected(a,b) → shortest-path geometry</text>
  <text x="404" y="356" class="small">separated(a,b) → barrier edge or polygon</text>
  <path d="M500 382 L500 428" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <polygon points="500,438 494,426 506,426" fill="#94a3b8"/>
  <rect x="386" y="440" width="228" height="82" fill="#ecfccb" stroke="#84cc16" stroke-width="1.2" rx="10"/>
  <text x="404" y="466" class="text">Reasoning-ready context</text>
  <text x="404" y="490" class="small">topology + measurements + semantic tags</text>
  <text x="404" y="510" class="small">for pathfinding, accessibility, and intervention logic</text>

  <rect x="674" y="96" width="290" height="370" class="box"/>
  <text x="694" y="126" class="label">Topological space</text>
  <text x="694" y="146" class="small">Adjacency, containment, barriers, hierarchy</text>
  <rect x="700" y="178" width="238" height="220" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.2" rx="10"/>
  <line x1="748" y1="252" x2="818" y2="212" stroke="#94a3b8" stroke-width="3"/>
  <line x1="748" y1="252" x2="780" y2="330" stroke="#94a3b8" stroke-width="3"/>
  <line x1="818" y1="212" x2="886" y2="258" stroke="#94a3b8" stroke-width="3"/>
  <line x1="780" y1="330" x2="852" y2="332" stroke="#94a3b8" stroke-width="3"/>
  <line x1="852" y1="332" x2="886" y2="258" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="748" cy="252" r="17" fill="#ef4444"/>
  <circle cx="818" cy="212" r="17" fill="#10b981"/>
  <circle cx="780" cy="330" r="17" fill="#3b82f6"/>
  <circle cx="852" cy="332" r="17" fill="#f59e0b"/>
  <circle cx="886" cy="258" r="17" fill="#8b5cf6"/>
  <rect x="714" y="370" width="90" height="16" fill="#fecaca" rx="8"/>
  <text x="714" y="364" class="small">barrier relation</text>
  <rect x="820" y="370" width="86" height="16" fill="#bfdbfe" rx="8"/>
  <text x="820" y="364" class="small">connected path</text>
  <text x="708" y="425" class="text">• graph nodes represent junctions, clusters, plazas</text>
  <text x="708" y="447" class="text">• graph edges encode adjacency and separation</text>

  <path d="M326 284 L352 284" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M640 284 L666 284" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="36" y="504" width="928" height="88" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3" rx="12"/>
  <text x="56" y="534" class="label">Why this matters for the paper</text>
  <text x="56" y="558" class="text">1. It explains how UrbanAgent preserves both metric urban form and relational urban structure.</text>
  <text x="56" y="578" class="text">2. It visually separates the software's key methodological novelty from the higher-level agent pipeline.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#64748b"/>
    </marker>
  </defs>
</svg>