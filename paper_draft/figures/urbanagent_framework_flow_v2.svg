<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="fig1-title fig1-desc">
  <title id="fig1-title">UrbanAgent workflow-centric framework</title>
  <desc id="fig1-desc">Workflow-centric framework and supporting implementation stack of UrbanAgent, showing four analytical phases, three cross-cutting mechanisms, and a five-layer software stack.</desc>

  <style>
    .title   { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .sub     { font: 12px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    .sect    { font: 700 10px 'Segoe UI', Arial, sans-serif; fill: #9ca3af; letter-spacing: 1.5px; }
    .pnum    { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #fff; }
    .ptitle  { font: 700 12.5px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .ptext   { font: 11px 'Segoe UI', Arial, sans-serif; fill: #374151; }
    .iol     { font: 700 12.5px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .iot     { font: 10.5px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .bt      { font: 700 11px 'Segoe UI', Arial, sans-serif; }
    .bd      { font: 10px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    .ltag    { font: 700 10px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    .ltxt    { font: 10px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    .fb      { font: italic 10.5px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    .conn    { font: italic 9.5px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
  </style>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#64748b"/></marker>
    <marker id="af" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#94a3b8"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#fffdf8"/>

  <!-- ==================== TITLE ==================== -->
  <text x="600" y="28" class="title" text-anchor="middle">UrbanAgent — Workflow-Centric Framework</text>
  <text x="600" y="48" class="sub" text-anchor="middle">Four analytical phases (I–IV)  ·  three cross-cutting mechanisms  ·  five-layer implementation stack</text>

  <!-- ==================== FEEDBACK LOOP (above phases) ==================== -->
  <path d="M 916 96 C 916 50, 220 50, 220 96" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#af)"/>
  <text x="568" y="65" class="fb" text-anchor="middle">Iterative Feedback Loop</text>

  <!-- ==================== SECTION A: ANALYTICAL WORKFLOW ==================== -->
  <text x="46" y="88" class="sect">ANALYTICAL WORKFLOW</text>
  <rect x="40" y="93" width="1120" height="175" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ---- Input ---- -->
  <rect x="52" y="130" width="105" height="105" rx="10" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="104" y="158" class="iol" text-anchor="middle">User</text>
  <text x="104" y="174" class="iot" text-anchor="middle">NL query</text>
  <text x="104" y="188" class="iot" text-anchor="middle">Urban data</text>
  <text x="104" y="202" class="iot" text-anchor="middle">Policy docs</text>

  <!-- ---- Phase I ---- -->
  <rect x="185" y="100" width="175" height="160" rx="12" fill="#ecfdf5" stroke="#34d399" stroke-width="1.8"/>
  <circle cx="272" cy="117" r="13" fill="#10b981"/>
  <text x="272" y="122" class="pnum" text-anchor="middle">I</text>
  <text x="272" y="142" class="ptitle" text-anchor="middle">Task Grounding &amp;</text>
  <text x="272" y="156" class="ptitle" text-anchor="middle">Context Construction</text>
  <line x1="200" y1="163" x2="345" y2="163" stroke="#d1fae5" stroke-width="1"/>
  <text x="200" y="179" class="ptext">• Task decomposition</text>
  <text x="200" y="194" class="ptext">• Data-source inventory</text>
  <text x="200" y="209" class="ptext">• Scope definition</text>
  <text x="200" y="224" class="ptext">• Constraint setting</text>

  <!-- ---- Phase II ---- -->
  <rect x="385" y="100" width="175" height="160" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.8"/>
  <circle cx="472" cy="117" r="13" fill="#3b82f6"/>
  <text x="472" y="122" class="pnum" text-anchor="middle">II</text>
  <text x="472" y="142" class="ptitle" text-anchor="middle">Perception &amp;</text>
  <text x="472" y="156" class="ptitle" text-anchor="middle">Dual-Space Cognition</text>
  <line x1="400" y1="163" x2="545" y2="163" stroke="#dbeafe" stroke-width="1"/>
  <text x="400" y="179" class="ptext">• Vector-space parsing</text>
  <text x="400" y="194" class="ptext">• Topological extraction</text>
  <text x="400" y="209" class="ptext">• Semantic annotation</text>
  <text x="400" y="224" class="ptext">• Pattern recognition</text>

  <!-- ---- Phase III ---- -->
  <rect x="585" y="100" width="175" height="160" rx="12" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.8"/>
  <circle cx="672" cy="117" r="13" fill="#f59e0b"/>
  <text x="672" y="122" class="pnum" text-anchor="middle">III</text>
  <text x="672" y="142" class="ptitle" text-anchor="middle">Reasoning &amp;</text>
  <text x="672" y="156" class="ptitle" text-anchor="middle">Decision</text>
  <line x1="600" y1="163" x2="745" y2="163" stroke="#fef3c7" stroke-width="1"/>
  <text x="600" y="179" class="ptext">• Task-specific strategy</text>
  <text x="600" y="194" class="ptext">• Indicator composition</text>
  <text x="600" y="209" class="ptext">• Constraint checking</text>
  <text x="600" y="224" class="ptext">• Memory retrieval</text>

  <!-- ---- Phase IV ---- -->
  <rect x="785" y="100" width="175" height="160" rx="12" fill="#fff1f2" stroke="#fb7185" stroke-width="1.8"/>
  <circle cx="872" cy="117" r="13" fill="#ef4444"/>
  <text x="872" y="122" class="pnum" text-anchor="middle">IV</text>
  <text x="872" y="142" class="ptitle" text-anchor="middle">Action &amp;</text>
  <text x="872" y="156" class="ptitle" text-anchor="middle">Output Generation</text>
  <line x1="800" y1="163" x2="945" y2="163" stroke="#fee2e2" stroke-width="1"/>
  <text x="800" y="179" class="ptext">• MCP tool dispatch</text>
  <text x="800" y="194" class="ptext">• GIS rendering</text>
  <text x="800" y="209" class="ptext">• Report generation</text>
  <text x="800" y="224" class="ptext">• Benchmark evaluation</text>

  <!-- ---- Output ---- -->
  <rect x="990" y="130" width="118" height="105" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="1049" y="158" class="iol" text-anchor="middle">Outputs</text>
  <text x="1049" y="174" class="iot" text-anchor="middle">Maps / GeoJSON</text>
  <text x="1049" y="188" class="iot" text-anchor="middle">Reports</text>
  <text x="1049" y="202" class="iot" text-anchor="middle">Benchmark scores</text>

  <!-- ---- Horizontal arrows ---- -->
  <line x1="157" y1="180" x2="183" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="360" y1="180" x2="383" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="560" y1="180" x2="583" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="760" y1="180" x2="783" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="960" y1="180" x2="988" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ==================== SECTION B: CROSS-CUTTING MECHANISMS ==================== -->
  <text x="46" y="290" class="sect">CROSS-CUTTING MECHANISMS</text>

  <!-- Band 1: Spatio-Temporal Memory -->
  <rect x="52" y="298" width="1096" height="30" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="68" y="317" class="bt" style="fill:#6d28d9">Spatio-Temporal Memory</text>
  <text x="260" y="317" class="bd">working  ·  short-term  ·  long-term context windows</text>

  <!-- Band 2: MCP Interoperability -->
  <rect x="52" y="334" width="1096" height="30" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2"/>
  <text x="68" y="353" class="bt" style="fill:#c2410c">MCP Interoperability</text>
  <text x="240" y="353" class="bd">standardized tool protocol  ·  connectors  ·  semantic adapters</text>

  <!-- Band 3: Human–AI Checkpoints -->
  <rect x="52" y="370" width="1096" height="30" rx="6" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="68" y="389" class="bt" style="fill:#0f766e">Human–AI Checkpoints</text>
  <text x="255" y="389" class="bd">iterative review  ·  scope refinement  ·  approval gates</text>

  <!-- Dashed connectors: phases → cross-cutting -->
  <line x1="272" y1="260" x2="272" y2="298" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="472" y1="260" x2="472" y2="298" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="672" y1="260" x2="672" y2="298" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="872" y1="260" x2="872" y2="298" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ==================== SECTION C: IMPLEMENTATION STACK ==================== -->
  <!-- Connector label -->
  <text x="600" y="418" class="conn" text-anchor="middle">▼  realized by  ▼</text>

  <text x="46" y="438" class="sect">SUPPORTING IMPLEMENTATION STACK</text>

  <!-- L5 (top – lightest) -->
  <rect x="52" y="446" width="1096" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="68" y="461" class="ltag">L5</text>
  <text x="94" y="461" class="ltxt">Application Orchestration — task decomposition · strategy selection · output assembly</text>

  <!-- L4 -->
  <rect x="52" y="472" width="1096" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="68" y="487" class="ltag">L4</text>
  <text x="94" y="487" class="ltxt">Semantic &amp; Benchmark Adapters — plan-space bridging · urban-type mapping · benchmark harness</text>

  <!-- L3 -->
  <rect x="52" y="498" width="1096" height="22" rx="4" fill="#e8ecf1" stroke="#94a3b8" stroke-width="1"/>
  <text x="68" y="513" class="ltag">L3</text>
  <text x="94" y="513" class="ltxt">External Connectors — OSM · Rhino.Compute · databases · traffic signal APIs</text>

  <!-- L2 -->
  <rect x="52" y="524" width="1096" height="22" rx="4" fill="#dde3ea" stroke="#94a3b8" stroke-width="1"/>
  <text x="68" y="539" class="ltag">L2</text>
  <text x="94" y="539" class="ltxt">Geospatial Capabilities — routing · spatial indexing · network analysis · geometry operations</text>

  <!-- L1 (bottom – darkest) -->
  <rect x="52" y="550" width="1096" height="22" rx="4" fill="#d0d7e0" stroke="#64748b" stroke-width="1"/>
  <text x="68" y="565" class="ltag">L1</text>
  <text x="94" y="565" class="ltxt">Foundation Execution — Python runtime · LLM integration · configuration management</text>

</svg>
