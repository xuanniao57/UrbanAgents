<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Qwen and Kimi quick benchmark overall comparison</title>
  <desc id="desc">Grouped bar chart comparing baseline and enhanced overall scores for Qwen and Kimi in the CityData-direct quick benchmark.</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .tick { font: 12px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    .text { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
  </style>
  <rect width="920" height="560" fill="#fffdf8"/>
  <text x="34" y="42" class="title">Multimodal quick benchmark: Qwen and Kimi</text>
  <text x="34" y="68" class="subtitle">Overall averages from the CityData-direct quick benchmark, 10 samples per task and 8 task families per configuration.</text>

  <rect x="620" y="28" width="16" height="16" fill="#7aa6ff" rx="3"/>
  <text x="644" y="41" class="text">baseline</text>
  <rect x="732" y="28" width="16" height="16" fill="#ef8a62" rx="3"/>
  <text x="756" y="41" class="text">enhanced</text>

  <line x1="120" y1="470" x2="840" y2="470" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="120" y1="470" x2="120" y2="130" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="120" y1="402" x2="840" y2="402" stroke="#e5e7eb"/>
  <line x1="120" y1="334" x2="840" y2="334" stroke="#e5e7eb"/>
  <line x1="120" y1="266" x2="840" y2="266" stroke="#e5e7eb"/>
  <line x1="120" y1="198" x2="840" y2="198" stroke="#e5e7eb"/>
  <line x1="120" y1="130" x2="840" y2="130" stroke="#e5e7eb"/>
  <text x="98" y="474" class="tick">0.0</text>
  <text x="98" y="406" class="tick">0.1</text>
  <text x="98" y="338" class="tick">0.2</text>
  <text x="98" y="270" class="tick">0.3</text>
  <text x="98" y="202" class="tick">0.4</text>
  <text x="98" y="134" class="tick">0.5</text>

  <text x="275" y="498" text-anchor="middle" class="label">Qwen</text>
  <rect x="205" y="303.2" width="70" height="166.8" fill="#7aa6ff" rx="8"/>
  <rect x="295" y="103.9" width="70" height="366.1" fill="#ef8a62" rx="8"/>
  <text x="240" y="293" text-anchor="middle" class="text">0.2453</text>
  <text x="330" y="94" text-anchor="middle" class="text">0.5384</text>

  <text x="565" y="498" text-anchor="middle" class="label">Kimi</text>
  <rect x="495" y="304.4" width="70" height="165.6" fill="#7aa6ff" rx="8"/>
  <rect x="585" y="96" width="70" height="374" fill="#ef8a62" rx="8"/>
  <text x="530" y="294" text-anchor="middle" class="text">0.2435</text>
  <text x="620" y="86" text-anchor="middle" class="text">0.5500</text>

  <rect x="694" y="126" width="180" height="136" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" rx="12"/>
  <text x="714" y="152" class="label">Improvement</text>
  <text x="714" y="180" class="text">Qwen: +119.5%</text>
  <text x="714" y="206" class="text">Kimi: +125.9%</text>
  <text x="714" y="234" class="small">Both models show large gains</text>
  <text x="714" y="252" class="small">after structured reasoning and</text>
  <text x="714" y="270" class="small">enhanced action formatting.</text>

  <rect x="694" y="296" width="180" height="156" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" rx="12"/>
  <text x="714" y="322" class="label">Shared pattern</text>
  <text x="714" y="348" class="small">Strong gains:</text>
  <text x="732" y="368" class="small">mobility prediction</text>
  <text x="732" y="388" class="small">outdoor navigation</text>
  <text x="732" y="408" class="small">urban exploration</text>
  <text x="714" y="434" class="small">Persistent weakness:</text>
  <text x="732" y="454" class="small">image-heavy perception tasks</text>

  <text x="34" y="534" class="text">Figure purpose: summarize the multi-backend validation while leaving task-level detail to Table 2.</text>
</svg>