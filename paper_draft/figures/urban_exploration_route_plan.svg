<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Urban exploration route plan</title>
  <desc id="desc">Stylized route map for the Tianzifang exploration planning case study with numbered waypoints and category diversity.</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .text { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #374151; }
  </style>
  <rect width="960" height="620" fill="#fffdf8"/>
  <text x="34" y="40" class="title">Case study 3: urban exploration route planning</text>
  <text x="34" y="64" class="subtitle">The route optimizes category coverage, spatial diversity, and a two-hour walking constraint.</text>

  <rect x="36" y="96" width="620" height="470" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="12"/>
  <rect x="62" y="122" width="568" height="418" fill="#eef2ff" stroke="#cbd5e1" stroke-width="1" rx="10"/>
  <path d="M118 490 C140 410, 164 340, 198 310 S284 244, 340 236 S428 192, 470 210 S532 272, 566 250" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="118" cy="490" r="16" fill="#be123c"/>
  <circle cx="198" cy="310" r="16" fill="#2563eb"/>
  <circle cx="340" cy="236" r="16" fill="#16a34a"/>
  <circle cx="470" cy="210" r="16" fill="#d97706"/>
  <circle cx="566" cy="250" r="16" fill="#7c3aed"/>
  <circle cx="424" cy="336" r="16" fill="#0891b2"/>
  <circle cx="262" cy="408" r="16" fill="#dc2626"/>
  <path d="M566 250 C518 286, 492 312, 424 336 S318 382, 262 408" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="112" y="495" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">1</text>
  <text x="198" y="315" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">2</text>
  <text x="340" y="241" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">3</text>
  <text x="470" y="215" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">4</text>
  <text x="566" y="255" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">5</text>
  <text x="424" y="341" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">6</text>
  <text x="262" y="413" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Segoe UI">7</text>

  <text x="136" y="520" class="small">start: workshop lane</text>
  <text x="156" y="292" class="small">gallery cluster</text>
  <text x="298" y="218" class="small">heritage courtyard</text>
  <text x="488" y="192" class="small">commercial node</text>
  <text x="584" y="232" class="small">food destination</text>
  <text x="442" y="318" class="small">temple / cultural stop</text>
  <text x="280" y="390" class="small">residential edge</text>

  <rect x="688" y="110" width="230" height="184" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3" rx="12"/>
  <text x="710" y="138" class="label">Route objectives</text>
  <text x="710" y="164" class="text">• 2-hour comfortable walking loop</text>
  <text x="710" y="188" class="text">• top-8 POI categories represented</text>
  <text x="710" y="212" class="text">• sequence from culture to commerce</text>
  <text x="710" y="236" class="text">• spatial spread beyond one alley cluster</text>
  <text x="710" y="260" class="text">• return path through food / retail edge</text>

  <rect x="688" y="314" width="230" height="216" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3" rx="12"/>
  <text x="710" y="342" class="label">Route summary</text>
  <text x="710" y="368" class="text">Estimated distance: 3.8 km</text>
  <text x="710" y="392" class="text">Stops shown: 7 key waypoints</text>
  <text x="710" y="416" class="text">Activity sequence:</text>
  <text x="728" y="438" class="small">workshop → gallery → heritage</text>
  <text x="728" y="458" class="small">commercial → food → temple</text>
  <text x="728" y="478" class="small">residential return corridor</text>
  <text x="710" y="506" class="text">Use in paper: qualitative evidence that</text>
  <text x="728" y="526" class="small">the agent produces spatially interpretable</text>
  <text x="728" y="546" class="small">route planning rather than only text answers.</text>

  <text x="36" y="596" class="small">This figure is schematic. In a later revision it can be replaced by a cartographically exact route overlay exported from the UrbanAgent visualization stack.</text>
</svg>