<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Qwen quick benchmark comparison</title>
  <desc id="desc">Grouped horizontal bar chart comparing baseline and enhanced UrbanAgent scores across eight CityData-direct task types.</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .tick { font: 12px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    .legend { font: 13px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .value { font: 12px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
  </style>

  <rect x="0" y="0" width="960" height="560" fill="#fffdf8"/>
  <text x="44" y="42" class="title">Qwen Quick Benchmark: Baseline vs. Enhanced UrbanAgent</text>
  <text x="44" y="68" class="subtitle">CityData-direct quick benchmark, 10 samples per task, scores normalized to [0, 1]</text>

  <rect x="620" y="30" width="16" height="16" fill="#7aa6ff" rx="3"/>
  <text x="644" y="43" class="legend">Baseline</text>
  <rect x="740" y="30" width="16" height="16" fill="#ef8a62" rx="3"/>
  <text x="764" y="43" class="legend">Enhanced</text>

  <line x1="240" y1="110" x2="900" y2="110" class="grid"/>
  <line x1="240" y1="160" x2="900" y2="160" class="grid"/>
  <line x1="240" y1="210" x2="900" y2="210" class="grid"/>
  <line x1="240" y1="260" x2="900" y2="260" class="grid"/>
  <line x1="240" y1="310" x2="900" y2="310" class="grid"/>
  <line x1="240" y1="360" x2="900" y2="360" class="grid"/>
  <line x1="240" y1="410" x2="900" y2="410" class="grid"/>
  <line x1="240" y1="460" x2="900" y2="460" class="grid"/>
  <line x1="240" y1="510" x2="900" y2="510" class="grid"/>

  <line x1="240" y1="100" x2="240" y2="500" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="240" y1="500" x2="900" y2="500" stroke="#9ca3af" stroke-width="1.5"/>

  <line x1="240" y1="500" x2="240" y2="505" stroke="#9ca3af"/>
  <line x1="372" y1="500" x2="372" y2="505" stroke="#9ca3af"/>
  <line x1="504" y1="500" x2="504" y2="505" stroke="#9ca3af"/>
  <line x1="636" y1="500" x2="636" y2="505" stroke="#9ca3af"/>
  <line x1="768" y1="500" x2="768" y2="505" stroke="#9ca3af"/>
  <line x1="900" y1="500" x2="900" y2="505" stroke="#9ca3af"/>

  <text x="240" y="525" text-anchor="middle" class="tick">0.0</text>
  <text x="372" y="525" text-anchor="middle" class="tick">0.2</text>
  <text x="504" y="525" text-anchor="middle" class="tick">0.4</text>
  <text x="636" y="525" text-anchor="middle" class="tick">0.6</text>
  <text x="768" y="525" text-anchor="middle" class="tick">0.8</text>
  <text x="900" y="525" text-anchor="middle" class="tick">1.0</text>

  <text x="220" y="132" text-anchor="end" class="label">Population prediction</text>
  <rect x="240" y="118" width="41.32" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="132" width="0" height="12" fill="#ef8a62" rx="3"/>
  <text x="289" y="128" class="value">0.063</text>
  <text x="248" y="142" class="value">0.000</text>

  <text x="220" y="182" text-anchor="end" class="label">Object detection</text>
  <rect x="240" y="168" width="0" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="182" width="4.55" height="12" fill="#ef8a62" rx="3"/>
  <text x="248" y="178" class="value">0.000</text>
  <text x="252" y="192" class="value">0.007</text>

  <text x="220" y="232" text-anchor="end" class="label">Geolocation</text>
  <rect x="240" y="218" width="528" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="232" width="528" height="12" fill="#ef8a62" rx="3"/>
  <text x="776" y="228" class="value">0.800</text>
  <text x="776" y="242" class="value">0.800</text>

  <text x="220" y="282" text-anchor="end" class="label">GeoQA</text>
  <rect x="240" y="268" width="66" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="282" width="66" height="12" fill="#ef8a62" rx="3"/>
  <text x="314" y="278" class="value">0.100</text>
  <text x="314" y="292" class="value">0.100</text>

  <text x="220" y="332" text-anchor="end" class="label">Mobility prediction</text>
  <rect x="240" y="318" width="0" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="332" width="264" height="12" fill="#ef8a62" rx="3"/>
  <text x="248" y="328" class="value">0.000</text>
  <text x="512" y="342" class="value">0.400</text>

  <text x="220" y="382" text-anchor="end" class="label">Traffic signal</text>
  <rect x="240" y="368" width="660" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="382" width="660" height="12" fill="#ef8a62" rx="3"/>
  <text x="848" y="378" class="value">1.000</text>
  <text x="848" y="392" class="value">1.000</text>

  <text x="220" y="432" text-anchor="end" class="label">Outdoor navigation</text>
  <rect x="240" y="418" width="0" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="432" width="660" height="12" fill="#ef8a62" rx="3"/>
  <text x="248" y="428" class="value">0.000</text>
  <text x="848" y="442" class="value">1.000</text>

  <text x="220" y="482" text-anchor="end" class="label">Urban exploration</text>
  <rect x="240" y="468" width="0" height="12" fill="#7aa6ff" rx="3"/>
  <rect x="240" y="482" width="660" height="12" fill="#ef8a62" rx="3"/>
  <text x="248" y="478" class="value">0.000</text>
  <text x="848" y="492" class="value">1.000</text>
  
  <text x="44" y="548" class="subtitle">Overall average: baseline 0.2453, enhanced 0.5384. Largest improvements occur in structure-sensitive tasks rather than image-heavy perception tasks.</text>
</svg>