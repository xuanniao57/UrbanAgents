<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">UrbanAgent execution workflow</title>
  <desc id="desc">Execution workflow from user query to task payload, reasoning, MCP tools, connectors, and outputs.</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #111827; }
    .text { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
  </style>
  <rect width="1080" height="420" fill="#fffdf8"/>
  <text x="36" y="42" class="title">UrbanAgent execution workflow</text>
  <text x="36" y="68" class="subtitle">The operational path differs from the static architecture view by emphasizing task payload formation, MCP dispatch, and external interoperability.</text>

  <rect x="40" y="120" width="130" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="66" y="150" class="label">User query</text>
  <text x="60" y="172" class="text">natural-language request</text>

  <rect x="206" y="120" width="145" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="226" y="150" class="label">Task payload</text>
  <text x="224" y="172" class="text">task_type + structured fields</text>

  <rect x="386" y="120" width="145" height="70" rx="12" fill="#d9f99d" stroke="#84cc16" stroke-width="1.5"/>
  <text x="418" y="150" class="label">Perception</text>
  <text x="410" y="172" class="text">router and data parsers</text>

  <rect x="566" y="120" width="145" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="594" y="150" class="label">Reasoning</text>
  <text x="579" y="172" class="text">task-specific strategy</text>

  <rect x="746" y="120" width="145" height="70" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="791" y="150" class="label">Action</text>
  <text x="770" y="172" class="text">MCP-aligned dispatch</text>

  <rect x="926" y="120" width="120" height="70" rx="12" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="953" y="150" class="label">Outputs</text>
  <text x="947" y="172" class="text">answer + artifacts</text>

  <line x1="170" y1="155" x2="206" y2="155" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="351" y1="155" x2="386" y2="155" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="531" y1="155" x2="566" y2="155" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="711" y1="155" x2="746" y2="155" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="891" y1="155" x2="926" y2="155" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="362" y="258" width="180" height="88" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="411" y="286" class="label">Memory layer</text>
  <text x="390" y="308" class="text">working, short-term, long-term</text>
  <text x="404" y="328" class="text">context retrieval and updates</text>

  <rect x="604" y="248" width="170" height="108" rx="12" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  <text x="656" y="276" class="label">MCP tools</text>
  <text x="625" y="298" class="text">fetch_osm_data</text>
  <text x="625" y="318" class="text">analyze_connectivity</text>
  <text x="625" y="338" class="text">evaluate_grasshopper_definition</text>

  <rect x="812" y="248" width="220" height="108" rx="12" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="845" y="276" class="label">Connectors and adapters</text>
  <text x="832" y="298" class="text">OSM / files / services / DB</text>
  <text x="832" y="318" class="text">Rhino.Compute / Grasshopper</text>
  <text x="832" y="338" class="text">traffic-signal protocol adapter</text>

  <path d="M458 190 L458 248" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow2)"/>
  <path d="M638 190 L638 248" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow2)"/>
  <path d="M818 190 L818 248" stroke="#fb923c" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow2)"/>
  <line x1="774" y1="302" x2="812" y2="302" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="40" y="390" class="text">This figure complements Figure 1 by showing the runtime execution path rather than only the logical module arrangement.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#64748b"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#8b5cf6"/></marker>
  </defs>
</svg>